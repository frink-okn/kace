name: PR build (test image)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel any prior in-flight build for the same PR when a new commit lands.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-push-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve tag
        id: resolve
        run: |
          REPO_LC="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "image_lc=$REPO_LC"                                  >> "$GITHUB_OUTPUT"
          echo "tag_pr=pr-${PR_NUM}"                                >> "$GITHUB_OUTPUT"
          echo "tag_sha=pr-${PR_NUM}-${SHORT_SHA}"                  >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"                             >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.resolve.outputs.image_lc }}:${{ steps.resolve.outputs.tag_pr }}
            ${{ env.REGISTRY }}/${{ steps.resolve.outputs.image_lc }}:${{ steps.resolve.outputs.tag_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=pr-${{ github.event.pull_request.number }}
          cache-to:   type=gha,scope=pr-${{ github.event.pull_request.number }},mode=max

      - name: Comment image tag on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: kace-pr-image
          message: |
            🛠 PR test image built and pushed:

            - `${{ env.REGISTRY }}/${{ steps.resolve.outputs.image_lc }}:${{ steps.resolve.outputs.tag_pr }}` (moving tag, points to latest PR build)
            - `${{ env.REGISTRY }}/${{ steps.resolve.outputs.image_lc }}:${{ steps.resolve.outputs.tag_sha }}` (immutable, this commit)

            Pull: `docker pull ${{ env.REGISTRY }}/${{ steps.resolve.outputs.image_lc }}:${{ steps.resolve.outputs.tag_sha }}`
