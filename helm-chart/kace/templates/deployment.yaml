apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kace.fullname" . }}
  labels:
    {{- include "kace.labels" . | nindent 4 }}
    app: kace-web-hook
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kace.selectorLabels" . | nindent 6 }}
      app: kace-web-hook
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kace.selectorLabels" . | nindent 8 }}
        app: kace-web-hook
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kace.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-web-server
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{ include "kace.env_variables" . | nindent 12 }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace }}

          command:
            - 'uvicorn'
            - {{.Values.command.entry }}
            - '--host'
            - '0.0.0.0'
            - '--port'
            - '9898'
            - '--workers'
            - '1'
            - '--timeout-keep-alive'
            - '3600'
          ports:
            - name: http
              containerPort: 9898
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: {{ .Values.app_config.local_data_dir }}
              {{ if .Values.app_config.local_pvc_create }}
              name: local
              {{ else }}
              name: shared
              subPath: {{ .Values.app_config.local_pvc_subpath }}
              {{ end }}
            {{ if .Values.app_config.shared_pvc_name }}
            - mountPath: {{ .Values.app_config.shared_data_dir }}
              name: shared
            {{ end }}
        {{- if eq .Values.workerMode "celery" }}
        - name: {{ .Chart.Name}}-celery-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - 'celery'
            - '-A'
            - 'celery_tasks'
            - 'worker'
            - '--loglevel=INFO'
            - '--concurrency'
            - '2'
          env:
            {{ include "kace.env_variables" . | nindent 12 }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: {{ .Values.app_config.local_data_dir }}
            {{ if .Values.app_config.local_pvc_create }}
              name: local
            {{ else }}
              name: shared
              subPath: {{ .Values.app_config.local_pvc_subpath }}
            {{ end }}
            {{ if .Values.app_config.shared_pvc_name }}
            - mountPath: {{ .Values.app_config.shared_data_dir }}
              name: shared
            {{ end }}
        - name: {{ .Chart.Name}}-redis
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "yes"
          ports:
            - name: http
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
        {{- end }}
        {{- if eq .Values.workerMode "temporal" }}
        - name: {{ .Chart.Name }}-temporal-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - 'python'
            - '-m'
            - 'temporal_app.worker'
          env:
            {{ include "kace.env_variables" . | nindent 12 }}
            - name: K8S_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: TEMPORAL_HOST
              value: {{ include "kace.temporalHost" . | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.app_config.temporal_namespace | default "default" | quote }}
          resources:
            {{- toYaml .Values.temporal_worker.resources | nindent 12 }}
          volumeMounts:
            - mountPath: {{ .Values.app_config.local_data_dir }}
            {{ if .Values.app_config.local_pvc_create }}
              name: local
            {{ else }}
              name: shared
              subPath: {{ .Values.app_config.local_pvc_subpath }}
            {{ end }}
            {{ if .Values.app_config.shared_pvc_name }}
            - mountPath: {{ .Values.app_config.shared_data_dir }}
              name: shared
            {{ end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{ if .Values.app_config.local_pvc_create }}
        - name: local
          persistentVolumeClaim:
            claimName: {{ .Values.app_config.local_pvc_name }}
        {{ end }}
        {{ if .Values.app_config.shared_pvc_name }}
        - name: shared
          persistentVolumeClaim:
            claimName: {{ .Values.app_config.shared_pvc_name }}
        {{ end }}