# Default values for kace.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Worker mode: "celery" (default) or "temporal"
workerMode: "celery"

image:
  repository: containers.renci.org/frink/kace
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.0.9"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
   fsGroup: 0
   fsGroupChangePolicy: OnRootMismatch

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
   limits:
     cpu: 3
     memory: 4Gi
     ephemeral-storage: 100Mi
   requests:
     cpu: 100m
     memory: 128Mi
     ephemeral-storage: 20Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Celery Redis sidecar (only used when workerMode: celery)
redis:
  image:
    repository: docker.io/redis
    tag: alpine3.22
  resources:
    limits:
      cpu: 100m
      memory: 1Gi
      ephemeral-storage: 20Mi
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 20Mi

# Temporal worker resources (only used when workerMode: temporal)
temporal_worker:
  resources:
    limits:
      cpu: 1
      memory: 2Gi
      ephemeral-storage: 100Mi
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 20Mi

# PostgreSQL for Temporal
temporal_pg:
  internal: true                # true = deploy StatefulSet, false = use external
  image: postgres:16-alpine
  storage: 5Gi
  storageClass: ""
  user: temporal
  password: "temporal"          # change in production or use existingSecret
  existingSecret: ""            # K8s secret name (must have key "password")
  secretKey: "password"
  # External PG settings (used when internal: false)
  host: ""
  port: 5432
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

command:
  entry: "server:app"
app_config:
  lakefs_url: "http://lakefs"
  lakefs_access_key: ""
  lakefs_secret_key: ""
  # mount location of shared pvc
  shared_data_dir: ""
  # mount location of local-pvc
  local_data_dir: "/local/"
  # this will create a pvc
  local_pvc_name: "kace-local-pvc"
  # shared with other components, useful for deployment.
  shared_pvc_name: ""
  local_pvc_size: 20Gi
  local_pvc_storage_class: ""
  # Temporal config (used when workerMode: temporal)
  temporal_host: ""             # auto-detected if empty
  temporal_namespace: "default"
  # Networking mode: "gateway" (HTTPRoute + HealthCheckPolicy) or "ingress" (Kubernetes Ingress)
#  networking_mode: "gateway"
  # Comma-separated lakefs repo names that bypass KG registry lookup (synthetic KG used).
  conversion_skip_repos: "wikidata"
  # LDF aggregator (single multi-KG LDF deployment)
  ldf_pvc_name: "frink-ldf-data"
  ldf_pvc_size: "1Ti"
  ldf_pvc_storage_class: "shared-ssd-sc"
  ldf_replicas: "1"
  ldf_image: "containers.renci.org/frink/ldf-server:2023-09-13"
  ldf_extra_datasources: '[{"title":"Wikidata","data_source_path":"wikidata","hdt_file_name":"wikidata-all.hdt"},{"title":"Ubergraph","data_source_path":"ubergraph","hdt_file_name":"ubergraph.hdt"}]'
  ldf_sync_image: ""
  ldf_host_name: "frink.apps.renci.org"
  # QLever federated index build (QLeverIndexWorkflow)
  qlever_image: "adfreiburg/qlever:commit-99b6db5"
  qlever_indexer_cpu: "8"
  qlever_indexer_memory: "100Gi"
  qlever_indexer_stxxl_memory: "40G"
  qlever_index_pvc_size: "3Ti"
  qlever_index_pvc_storage_class: "premium-rwo"
  qlever_source_path: "/shared/qlever-source"
  qlever_state_configmap: "kace-qlever-state"
  qlever_index_pvc_prefix: "kace-qlever-index-"
  qlever_index_previous_ttl_hours: "24"
  qlever_download_concurrency: "2"
  LAKEFS_DOWNLOAD_PARTS: "4"
  qlever_num_triples_per_batch: "5000000"
  # QLever federation server (/federation)
  qlever_federation_cpu: "8"
  qlever_federation_memory: "84Gi"
  qlever_federation_cache_pct: "0.30"
  qlever_federation_index_basename: "frink"
  qlever_federation_prefix: "federation"
  qlever_federation_extra_args: ""
  # Weekly QLever index build schedule (Temporal Schedule, upserted on worker boot).
  # Default fires Friday 18:00 UTC; ~1d17h build finishes before Sunday night.
  qlever_index_schedule_enabled: "true"
  qlever_index_schedule_id: "qlever-index-weekly"
  qlever_index_schedule_cron: "0 18 * * 5"
  qlever_index_schedule_timezone: "UTC"

# Temporal server subchart
temporal:
  enabled: false
  server:
    config:
      persistence:
        numHistoryShards: 512
        datastores:
          default:
            sql:
              pluginName: postgres12_pgx
              databaseName: temporal
              # Format: <release-fullname>-temporal-pg:<port>
              # Override if your release name != "kace" or using external PG
              connectAddr: "kace-temporal-pg:5432"
              connectProtocol: "tcp"
              user: temporal
              password: temporal
              maxConns: 4
              maxIdleConns: 4
          visibility:
            sql:
              pluginName: postgres12_pgx
              databaseName: temporal_visibility
              connectAddr: "kace-temporal-pg:5432"
              connectProtocol: "tcp"
              user: temporal
              password: temporal
              maxConns: 4
              maxIdleConns: 4
      namespaces:
        create: true
        namespace:
          - name: default
            retention: 30d
  web:
    enabled: true

